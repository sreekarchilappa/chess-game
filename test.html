<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Engine Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #f0f0f0;
        }
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .pass {
            background: #90EE90;
        }
        .fail {
            background: #FFB6C6;
        }
        pre {
            background: white;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Chess Engine Test</h1>
    <div id="results"></div>

    <script type="module">
        import ChessEngine from './src/game/ChessEngine.js';
        import BotAI from './src/game/BotAI.js';
        import DifficultyManager from './src/game/DifficultyManager.js';

        const resultsDiv = document.getElementById('results');

        function test(name, fn) {
            try {
                fn();
                const div = document.createElement('div');
                div.className = 'test-result pass';
                div.textContent = `✓ ${name}`;
                resultsDiv.appendChild(div);
            } catch (error) {
                const div = document.createElement('div');
                div.className = 'test-result fail';
                div.innerHTML = `✗ ${name}<br><pre>${error.message}</pre>`;
                resultsDiv.appendChild(div);
            }
        }

        // Test 1: Initialize board
        test('Initialize chess board', () => {
            const engine = new ChessEngine();
            if (!engine.board || engine.board.length !== 8) throw new Error('Board not initialized');
            if (engine.currentPlayer !== 'white') throw new Error('Current player should be white');
        });

        // Test 2: Get legal moves
        test('Get legal moves for white pawns', () => {
            const engine = new ChessEngine();
            const moves = engine.getLegalMoves();
            if (moves.length === 0) throw new Error('No legal moves found');
            if (moves.length < 16) throw new Error('Expected at least 16 moves (8 pawns × 2 moves)');
        });

        // Test 3: Make move
        test('Make a legal pawn move', () => {
            const engine = new ChessEngine();
            const success = engine.makeMove('e2e4');
            if (!success) throw new Error('Failed to make move e2e4');
            if (engine.currentPlayer !== 'black') throw new Error('Current player should be black after white move');
        });

        // Test 4: Piece position
        test('Verify piece position after move', () => {
            const engine = new ChessEngine();
            engine.makeMove('e2e4');
            const piece = engine.getPiece(4, 4);
            if (!piece || piece.type !== 'pawn' || piece.color !== 'white') {
                throw new Error('Pawn not at correct position after e2e4');
            }
        });

        // Test 5: Game state
        test('Get game state', () => {
            const engine = new ChessEngine();
            const state = engine.getGameState();
            if (!state.board || !state.moveHistory || state.currentPlayer !== 'white') {
                throw new Error('Invalid game state');
            }
        });

        // Test 6: Difficulty Manager
        test('Difficulty manager level progression', () => {
            const dm = new DifficultyManager();
            if (dm.getCurrentLevel() !== 1) throw new Error('Should start at level 1');
            for (let i = 0; i < 5; i++) {
                dm.recordWin();
            }
            if (dm.getCurrentLevel() !== 2) throw new Error('Should level up after 5 wins');
        });

        // Test 7: Bot AI
        test('Bot AI generates moves', () => {
            const engine = new ChessEngine();
            const botAI = new BotAI();
            const move = botAI.getBestMove(engine, 1);
            if (!move) throw new Error('Bot AI should generate a move');
            if (move.length !== 4) throw new Error('Move should be in algebraic notation');
        });

        // Test 8: Reset game
        test('Reset game state', () => {
            const engine = new ChessEngine();
            engine.makeMove('e2e4');
            engine.resetGame();
            if (engine.currentPlayer !== 'white') throw new Error('Should reset to white turn');
            if (engine.moveHistory.length !== 0) throw new Error('Move history should be empty');
            const piece = engine.getPiece(6, 4);
            if (!piece || piece.type !== 'pawn') throw new Error('Pawns should be back in starting position');
        });

        // Test 9: Castling rights
        test('Track castling rights', () => {
            const engine = new ChessEngine();
            if (!engine.castlingRights.white.kingside) throw new Error('White should have kingside castling');
            if (!engine.castlingRights.white.queenside) throw new Error('White should have queenside castling');
        });

        // Test 10: Check detection
        test('Detect legal moves in check', () => {
            const engine = new ChessEngine();
            // Move bishop and create a check scenario
            engine.makeMove('e2e4');
            engine.makeMove('e7e5');
            engine.makeMove('f1c4'); // Bishop targets f7
            engine.makeMove('d7d6');
            // Now white should have restricted moves if in check
            const moves = engine.getLegalMoves();
            if (moves.length === 0) throw new Error('Should have at least one legal move');
        });

        const summary = document.createElement('h2');
        summary.textContent = `Tests Complete: ${resultsDiv.children.length} total`;
        resultsDiv.parentElement.insertBefore(summary, resultsDiv);
    </script>
</body>
</html>
